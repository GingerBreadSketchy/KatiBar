<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="KatiBar Logo">
  <defs>
    <linearGradient id="shieldBg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8102E" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#000000" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#006A4E" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="kGradient" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C8102E" />
      <stop offset="100%" stop-color="#006A4E" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <path d="M50 5 L15 20 V45 C15 70 35 88 50 95 C65 88 85 70 85 45 V20 L50 5 Z" 
        fill="url(#shieldBg)" 
        stroke="rgba(255,255,255,0.2)" 
        stroke-width="2" />
  
  <g filter="url(#glow)">
    <rect x="38" y="25" width="6" height="50" rx="3" fill="url(#kGradient)" />
    <path d="M44 50 L65 28" stroke="url(#kGradient)" stroke-width="6" stroke-linecap="round" />
    <path d="M43 46 L65 72" stroke="url(#kGradient)" stroke-width="6" stroke-linecap="round" />
    <path d="M30 40 Q50 60 70 40" stroke="#D4A017" stroke-width="2" fill="none" opacity="0.8" />
  </g>
</svg>
